<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>StructEditor — Professional Test Suite v1.1</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #f0f4f8;
            --panel: #fff;
            --bd: #dde2ea;
            --acc: #2563eb;
            --acc2: #1d4ed8;
            --txt: #111827;
            --mu: #6b7280;
            --pass: #16a34a;
            --fail: #dc2626;
            --warn: #d97706;
            --skip: #0891b2;
            --pbg: #f0fdf4;
            --fbg: #fef2f2;
            --wbg: #fffbeb;
            --sbg: #ecfeff;
            --r: 6px;
        }

        body {
            font: 13px/1.5 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--txt);
            height: 100vh;
            overflow: hidden
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh
        }

        #top {
            background: linear-gradient(135deg, #1e3a5f 0%, #2d5a9e 100%);
            color: #fff;
            padding: 9px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .2)
        }

        #top h1 {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: -.3px;
            white-space: nowrap
        }

        .badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 9px;
            background: rgba(255, 255, 255, .18);
            font-weight: 600
        }

        #top select {
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, .3);
            background: rgba(255, 255, 255, .1);
            color: #fff;
            cursor: pointer
        }

        #top select option {
            color: #000;
            background: #fff
        }

        .sp1 {
            flex: 1
        }

        #ms {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: background .2s
        }

        #ms.ok {
            background: #dcfce7;
            color: var(--pass)
        }

        #ms.pend {
            background: #fef9c3;
            color: var(--warn)
        }

        #ms.err {
            background: #fee2e2;
            color: var(--fail)
        }

        .spin {
            width: 11px;
            height: 11px;
            border: 2px solid #93c5fd;
            border-top-color: var(--acc);
            border-radius: 50%;
            animation: sp .6s linear infinite;
            display: inline-block;
            flex-shrink: 0
        }

        @keyframes sp {
            to {
                transform: rotate(360deg)
            }
        }

        #panel-open-btn {
            font-size: 11px;
            padding: 4px 11px;
            border-radius: var(--r);
            border: 1px solid rgba(255, 255, 255, .35);
            background: rgba(255, 255, 255, .13);
            color: #fff;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
            transition: background .15s;
            flex-shrink: 0
        }

        #panel-open-btn:hover {
            background: rgba(255, 255, 255, .24)
        }

        #panel-open-btn.hidden {
            display: none
        }

        #main {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative
        }

        #ep {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            background: var(--panel);
            overflow: hidden
        }

        #eph {
            background: #f8fafc;
            border-bottom: 1px solid var(--bd);
            padding: 6px 12px;
            font-size: 10px;
            font-weight: 700;
            color: var(--mu);
            text-transform: uppercase;
            letter-spacing: .6px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0
        }

        #epb {
            flex: 1;
            overflow-y: auto;
            padding: 12px
        }

        .mlbl {
            font-size: 11px;
            color: var(--mu);
            font-weight: 600;
            margin-bottom: 4px;
            display: block
        }

        .xfe {
            background: #f9fafb;
            border: 1px dashed #c9d4e0;
            border-radius: 4px;
            padding: 8px
        }

        #modx-resource-content {
            width: 100%;
            min-height: 120px;
            font: 12px/1.5 monospace;
            padding: 7px;
            border: 1px solid #c9d4e0;
            border-radius: 3px;
            resize: vertical;
            background: #fff;
            color: #333
        }

        #editor-mount-target {
            min-height: 40px
        }

        #tp-scrim {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .38);
            z-index: 99
        }

        #tp {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg);
            width: 0;
            transition: width .26s cubic-bezier(.4, 0, .2, 1);
            position: relative
        }

        #tp.open {
            border-left: 1px solid var(--bd)
        }

        #tp-resize-handle {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 5px;
            cursor: col-resize;
            z-index: 10;
            background: transparent;
            transition: background .15s
        }

        #tp-resize-handle:hover {
            background: rgba(37, 99, 235, .2)
        }

        #tc {
            background: #f8fafc;
            border-bottom: 1px solid var(--bd);
            padding: 7px 10px 7px 14px;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            align-items: center;
            flex-shrink: 0
        }

        #panel-close-btn {
            margin-left: auto;
            padding: 3px 8px;
            border-radius: var(--r);
            border: 1px solid var(--bd);
            background: transparent;
            color: var(--mu);
            font: 13px/1.3 inherit;
            cursor: pointer;
            transition: all .15s;
            flex-shrink: 0
        }

        #panel-close-btn:hover {
            background: var(--fbg);
            border-color: #fca5a5;
            color: var(--fail)
        }

        .btn {
            padding: 4px 11px;
            border: 1px solid var(--bd);
            border-radius: var(--r);
            background: var(--panel);
            color: var(--txt);
            font: 12px/1 inherit;
            cursor: pointer;
            font-weight: 500;
            transition: all .1s;
            white-space: nowrap
        }

        .btn:hover {
            background: #eef2ff;
            border-color: var(--acc);
            color: var(--acc)
        }

        .btn:disabled {
            opacity: .4;
            cursor: default
        }

        .btn.pri {
            background: var(--acc);
            color: #fff;
            border-color: var(--acc2)
        }

        .btn.pri:hover:not(:disabled) {
            background: var(--acc2)
        }

        .btn.dan:hover {
            background: var(--fbg);
            border-color: #fca5a5;
            color: var(--fail)
        }

        #dsr {
            padding: 5px 10px;
            border-bottom: 1px solid var(--bd);
            background: var(--panel);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 6px
        }

        #dsr label {
            font-size: 11px;
            font-weight: 600;
            color: var(--mu);
            white-space: nowrap
        }

        #dssr {
            font-size: 11px;
            padding: 3px 6px;
            border: 1px solid var(--bd);
            border-radius: 4px;
            font: inherit;
            background: #fff;
            flex: 1;
            min-width: 0;
            cursor: pointer
        }

        #sb {
            padding: 5px 8px;
            border-bottom: 1px solid var(--bd);
            background: var(--panel);
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
            flex-shrink: 0
        }

        .sp {
            padding: 2px 8px;
            border-radius: 9px;
            font-size: 10px;
            font-weight: 600;
            border: 1px solid var(--bd);
            background: var(--bg);
            cursor: pointer;
            transition: all .1s;
            white-space: nowrap
        }

        .sp:hover {
            border-color: var(--acc);
            color: var(--acc)
        }

        .sp.on {
            background: var(--acc);
            color: #fff;
            border-color: var(--acc2)
        }

        #sm {

            background: var(--panel);
            border-bottom: 1px solid var(--bd);
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            font-size: 12px
        }

        .sc {

            align-items: center;
            gap: 3px;
            font-weight: 700
        }

        .sc.p {
            color: var(--pass)
        }

        .sc.f {
            color: var(--fail)
        }

        .sc.s {
            color: var(--skip)
        }

        .sc.w {
            color: var(--warn)
        }

        .sc.t {

        }

        #pbw {

            background: #e5e7eb;
            border-radius: 3px;

        #pb {

            width: 0;

        #rt {

            white-space: nowrap

        #rc {

        }

        .sg {

        }

        .sh {

            padding: 5px 8px;

        .shb {

            margin-left: auto
        }

        .shb.p {
            background: #dcfce7;
            color: var(--pass)
        }

        .shb.f {
            background: #fee2e2;
            color: var(--fail)
        }

        .shb.w {
            background: #fef9c3;
            color: var(--warn)
        }

        .shb.s {
            background: #ecfeff;
            color: var(--skip)
        }

        .sbdy {
            border: 1px solid var(--bd);
            border-top: none;
            border-radius: 0 0 var(--r) var(--r)
        }

        .sbdy.col {
            display: none
        }

        .ti {
            display: flex;
            align-items: flex-start;
            gap: 6px;
            padding: 4px 8px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 11px
        }

        .ti:last-child {
            border-bottom: none
        }

        .ti.pass {
            background: var(--pbg)
        }

        .ti.fail {
            background: var(--fbg)
        }

        .ti.skip {
            background: var(--sbg)
        }

        .ti.warn {
            background: var(--wbg)
        }

        .tic {
            font-size: 12px;
            flex-shrink: 0;
            margin-top: 1px
        }

        .tcc {
            flex: 1;
            min-width: 0

        .tn {
            font-weight: 600;
            font-size: 11px
        }

        .tm {
            font-size: 10px;
            color: var(--mu);
            margin-top: 2px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            white-space: pre-wrap;
            word-break: break-all
        }

        .tm.e {
            color: var(--fail)
        }

        .tt {
            font-size: 10px;
            color: var(--mu);
            flex-shrink: 0;
            margin-top: 1px
        }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px
        }

        ::-webkit-scrollbar-track {
            background: transparent
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px
        }

        @media(max-width:767px) {
            #tp {
                position: fixed;
                top: 0;
                right: -100%;

            }

            #tp.open {
                right: 0;
                border-left: none
            }

            #tp-resize-handle {
                display: none
            }
        }
    </style>
</head>

    <!-- Panel open/close/resize UI -->
    <script>
        (function () {
            var tp = null, scrim = null, openBtn = null, dragging = false, startX = 0, startW = 0;
            function isMobile() { return window.innerWidth < 768; }
            function openPanel() {
                if (isMobile()) { tp.classList.add('open'); scrim.style.display = 'block'; document.body.style.overflow = 'hidden'; }
                else { tp.style.width = Math.round(window.innerWidth * 0.34) + 'px'; tp.classList.add('open'); }
                openBtn.classList.add('hidden');
            }
            function closePanel() {
                if (isMobile()) { scrim.style.display = 'none'; document.body.style.overflow = ''; tp.classList.remove('open'); }
                else { tp.style.transition = 'width .26s cubic-bezier(.4,0,.2,1)'; tp.style.width = '0'; tp.classList.remove('open'); }
                openBtn.classList.remove('hidden');
            }
            document.addEventListener('DOMContentLoaded', function () {
                tp = document.getElementById('tp'); scrim = document.getElementById('tp-scrim');
                openBtn = document.getElementById('panel-open-btn');
                var closeBtn = document.getElementById('panel-close-btn');
                var handle = document.getElementById('tp-resize-handle');
                openBtn.addEventListener('click', openPanel);
                closeBtn.addEventListener('click', closePanel);
                scrim.addEventListener('click', closePanel);
                handle.addEventListener('mousedown', function (e) {
                    if (isMobile()) return; dragging = true; startX = e.clientX; startW = tp.offsetWidth;
                    tp.style.transition = 'none'; document.body.style.userSelect = 'none';
                    document.body.style.cursor = 'col-resize'; e.preventDefault();
                });
                document.addEventListener('mousemove', function (e) {
                    if (!dragging) return;
                    var delta = startX - e.clientX;
                    var nw = Math.min(Math.max(startW + delta, 240), Math.round(window.innerWidth * 0.82));
                    tp.style.width = nw + 'px';
                });
                document.addEventListener('mouseup', function () {
                    if (!dragging) return; dragging = false;
                    tp.style.transition = ''; document.body.style.userSelect = ''; document.body.style.cursor = '';
                });
                window.addEventListener('resize', function () {
                    if (isMobile()) { if (tp.classList.contains('open')) scrim.style.display = 'block'; tp.style.width = ''; }
                    else { scrim.style.display = 'none'; document.body.style.overflow = ''; }
                });
                if (!isMobile()) openPanel();
            });
        })();
    </script>

            /* ── Assertion helpers ────────────────────────────────────────────────── */
            function ass(c, m) { if (!c) throw new Error('Assert: ' + (m || 'false')); }
            function eq(a, b, m) { if (a !== b) throw new Error((m || 'eq') + '\n  exp:' + JSON.stringify(b) + '\n  got:' + JSON.stringify(a)); }
            function neq(a, b, m) { if (a === b) throw new Error((m || 'neq') + ': values are equal: ' + JSON.stringify(a)); }
            function has(s, sub, m) { if (typeof s !== 'string' || s.indexOf(sub) === -1) throw new Error((m || 'has') + ':\n  "' + sub + '" not in "' + String(s).substring(0, 120) + '"'); }
            function nohas(s, sub, m) { if (typeof s === 'string' && s.indexOf(sub) !== -1) throw new Error((m || 'nohas') + ':\n  "' + sub + '" unexpectedly found'); }
            function tp(v, t, m) { if (typeof v !== t) throw new Error((m || 'type') + ': exp ' + t + ' got ' + typeof v); }
            function ex(el, m) { if (!el) throw new Error(m || 'element not found'); }
            function gt(a, b, m) { if (!(a > b)) throw new Error((m || 'gt') + ': ' + a + ' not > ' + b); }
            function gte(a, b, m) { if (!(a >= b)) throw new Error((m || 'gte') + ': ' + a + ' not >= ' + b); }
            function lt(a, b, m) { if (!(a < b)) throw new Error((m || 'lt') + ': ' + a + ' not < ' + b); }

            /** Graceful skip: call when test is genuinely not applicable for current dataset/state */
            function skip(reason) { var e = new Error(reason || 'skipped'); e.__skip = true; throw e; }

            /* ── DOM accessors ────────────────────────────────────────────────────── */
            /** Returns window._sev8 or throws if not available */
            function se() {
                if (!window._sev8) throw new Error('window._sev8 not ready — load a dataset first');
                return window._sev8;
            }
            function root() { return document.getElementById('sev8'); }
            function nta() { return document.getElementById('modx-resource-content'); }
            function area() { var r = root(); return r ? r.querySelector('#sev8-area') : null; }
            function tas() { var r = root(); return r ? r.querySelectorAll('textarea.sev8-in') : []; }
            function tabs() { return document.querySelectorAll('.sev8-tab'); }
            function clickTab(name) {
                var ts = tabs();
                for (var i = 0; i < ts.length; i++)
                    if (ts[i].textContent.toLowerCase().indexOf(name.toLowerCase()) !== -1) { ts[i].click(); return true; }
                return false;
            }
            function syncBtn() {
                var tb = document.getElementById('sev8-tb'); if (!tb) return null;

            function undoBtn() {

                return null;
            }
            function fbtns() { return document.querySelectorAll('#sev8-fmtrow .sev8-fb'); }
            function fbtn(cls) { return document.querySelector('#sev8-fmtrow .sev8-fb.' + cls); }
            function fbtnByText(txt) {
                var bs = fbtns();
                for (var i = 0; i < bs.length; i++)if (bs[i].innerHTML.indexOf(txt) !== -1) return bs[i];

            }

                for (var i = 0; i < bs.length; i++)if (/поля/i.test(bs[i].textContent)) return bs[i];
                bs = r.querySelectorAll('button');
                for (var i = 0; i < bs.length; i++)if (/поля/i.test(bs[i].textContent)) return bs[i];
                return null;
            }
            function key(el, k, ctrl, shift) {
                el.dispatchEvent(new KeyboardEvent('keydown', { key: k, bubbles: true, cancelable: true, ctrlKey: !!ctrl, shiftKey: !!shift }));
            }
            function wait(ms) { return new Promise(function (r) { setTimeout(r, ms); }); }
            function eh(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

            /* ── Format-bar test helper ───────────────────────────────────────────── */
            /**
             * Focuses a struct textarea, sets selection, fires a format button,
             * then asserts the expected HTML tag/text appears in the value.
             */
            function fmtAction(btnCls, btnTxt, inputText, sel0, sel1, expected) {
                return new Promise(function (res, rej) {
                    clickTab('Структур');
                    setTimeout(function () {
                        try {
                            var ts2 = tas();
                            if (!ts2.length) { skip('no struct fields'); return; }
                            var ta = ts2[0];
                            ta.value = inputText;
                            ta.focus();
                            ta.setSelectionRange(sel0, sel1);
                            ta.dispatchEvent(new Event('focus', { bubbles: true }));
                            setTimeout(function () {
                                try {
                                    var btn = btnCls ? fbtn(btnCls) : fbtnByText(btnTxt);
                                    ex(btn, 'format button must exist: ' + (btnCls || btnTxt));
                                    btn.click();
                                    has(ta.value, expected, 'expected markup after btn click');
                                    res();
                                } catch (e) { rej(e); }
                            }, 280);
                        } catch (e) { rej(e); }
                    }, 180);
                });
            }

            var _mountTid = null, _mountAttempts = 0;
            function setMS(state, txt) {
                var el = document.getElementById('ms');
                el.className = state;
                el.innerHTML = state === 'pend' ? '<span class="spin"></span>&nbsp;' + txt : txt;
            }

            function doMount(html) {
                if (_mountTid) { clearInterval(_mountTid); _mountTid = null; }
                _mountAttempts = 0;
                setMS('pend', 'монтирование…');
                LI('SETUP', 'Loading dataset (' + html.length + ' chars)');

                var oldEd = document.getElementById('sev8'); if (oldEd) oldEd.remove();
                var oldCss = document.getElementById('sev8-css'); if (oldCss) oldCss.remove();

                var ta = document.getElementById('modx-resource-content');
                ta.style.display = ''; ta.value = html;

                // Re-arm test mode flag (survives across doMount calls)
                window._sev8testMode = true;
                window._sev8 = undefined; // cleared; will be set when new script loads

                window._sevPageReady = false;
                window.Ext = {
                    _cbs: [],
                    onReady: function (fn) { if (window._sevPageReady) fn(); else this._cbs.push(fn); },
                    _fire: function () { this._cbs.forEach(function (f) { try { f(); } catch (e) { } }); this._cbs = []; }
                };

                var oldScript = document.getElementById('sev8-script'); if (oldScript) oldScript.remove();
                var s = document.createElement('script');
                s.id = 'sev8-script'; s.src = 'struct-editor.js?_=' + Date.now();
                s.onload = function () {
                    window._sevPageReady = true;
                    if (window.Ext && window.Ext._fire) window.Ext._fire();
                    LD('SETUP', 'struct-editor.js loaded, _sev8=' + (window._sev8 ? 'ready' : 'NOT SET'));
                };
                document.body.appendChild(s);

                _mountTid = setInterval(function () {
                    _mountAttempts++;
                    var ed = document.getElementById('sev8');
                    if (ed) {
                        clearInterval(_mountTid); _mountTid = null;
                        setMS('ok', '✓ mounted (' + (_mountAttempts * 50) + 'ms)');
                        LI('SETUP', 'Editor mounted in ' + (_mountAttempts * 50) + 'ms. _sev8=' + (window._sev8 ? 'ready' : 'missing'));
                        RESULTS = []; updateSummary();
                        document.getElementById('rc').innerHTML = '<div style="color:#9ca3af;text-align:center;padding:32px;font-size:12px">Датасет загружен. Нажмите <b>Run All</b>.</div>';
                        return;
                    }
                    if (_mountAttempts >= 100) {
                        clearInterval(_mountTid); _mountTid = null;
                        setMS('err', '⚠ mount timeout');
                    }
                }, 50);
            }

            /* ── Suite filter bar ──────────────────────────────────────────────── */
            function renderSuiteBar() {
                var bar = document.getElementById('sb'); bar.innerHTML = '';
                var all = document.createElement('button'); all.className = 'sp' + (filterIdx === null ? ' on' : '');
                all.textContent = 'All'; all.onclick = function () { filterIdx = null; renderSuiteBar(); };
                bar.appendChild(all);
                SUITES.forEach(function (s, i) {
                    var p = document.createElement('button');
                    p.className = 'sp' + (filterIdx === i ? ' on' : '');
                    p.textContent = s.name.replace(/^[^:]+:\s*/, '').substring(0, 14);
                    p.onclick = function () { filterIdx = i; renderSuiteBar(); };
                    bar.appendChild(p);
                });
            }

            /* ── Summary ──────────────────────────────────────────────────────── */
            function updateSummary() {
                var pass = 0, fail = 0, sk = 0;
                RESULTS.forEach(function (r) { if (r.status === 'pass') pass++; else if (r.status === 'fail') fail++; else sk++; });
                document.getElementById('cp').textContent = pass;
                document.getElementById('cf').textContent = fail;
                document.getElementById('cs').textContent = sk;
                document.getElementById('ct').textContent = RESULTS.length;
                var total = RESULTS.length;
                var bar = document.getElementById('pb');
                bar.style.width = total ? ((pass + sk) / total * 100) + '%' : '0%';
                bar.style.background = fail ? '#dc2626' : pass ? '#16a34a' : '#d97706';
            }

            /* ── Results renderer ─────────────────────────────────────────────── */
            function renderResults() {
                var rc = document.getElementById('rc'); rc.innerHTML = '';
                var suites = {};
                RESULTS.forEach(function (r) { if (!suites[r.suite]) suites[r.suite] = []; suites[r.suite].push(r); });
                Object.keys(suites).forEach(function (sn) {
                    var items = suites[sn];
                    var grp = document.createElement('div'); grp.className = 'sg';
                    var hdr = document.createElement('div'); hdr.className = 'sh';
                    var pc = items.filter(function (i) { return i.status === 'pass'; }).length;
                    var fc = items.filter(function (i) { return i.status === 'fail'; }).length;
                    var sc = items.filter(function (i) { return i.status === 'skip'; }).length;
                    hdr.innerHTML = '<span>' + eh(sn) + '</span>';
                    var badge = document.createElement('span');
                    badge.className = 'shb ' + (fc ? 'f' : sc && !pc ? 's' : 'p');
                    badge.textContent = pc + '/' + items.length;
                    hdr.appendChild(badge);
                    var body = document.createElement('div');
                    body.className = 'sbdy' + (fc === 0 ? ' col' : '');
                    hdr.addEventListener('click', function () { body.classList.toggle('col'); });
                    items.forEach(function (r) {
                        var row = document.createElement('div');
                        row.className = 'ti ' + (r.status === 'skip' ? 'skip' : r.status);
                        var icon = r.status === 'pass' ? '&#x2713;' : r.status === 'fail' ? '&#x2717;' : '&#x2298;';
                        row.innerHTML = '<span class="tic">' + icon + '</span>' +
                            '<div class="tcc"><div class="tn">' + eh(r.name) + '</div>' +
                            (r.message ? '<div class="tm' + (r.status === 'fail' ? ' e' : '') + '">' + eh(r.message) + '</div>' : '') +
                            '</div><span class="tt">' + r.time + 'ms</span>';
                        body.appendChild(row);
                    });
                    grp.appendChild(hdr); grp.appendChild(body); rc.appendChild(grp);
                });
            }

            /* ── Runner ───────────────────────────────────────────────────────── */
            async function runSuites(list) {
                if (running) return; running = true;
                var t0 = performance.now();
                var total = list.reduce(function (a, s) { return a + s.tests.length; }, 0);
                document.getElementById('rc').innerHTML =
                    '<div style="padding:10px;color:#6b7280;font-size:12px;display:flex;align-items:center;gap:6px">' +
                    '<div class="spin"></div> Running ' + total + ' tests...</div>';
                ['ba', 'bs', 'bf'].forEach(function (id) { document.getElementById(id).disabled = true; });

                for (var si = 0; si < list.length; si++) {
                    var S = list[si];
                    LI('RUNNER', '== ' + S.name + ' ==');
                    for (var ti = 0; ti < S.tests.length; ti++) {
                        var tst = S.tests[ti], t1 = performance.now();
                        LD(S.name, '  -> ' + tst.name);
                        var res = { suite: S.name, name: tst.name, status: 'pass', message: '', time: 0 };
                        try {
                            var ret = tst.fn();
                            if (ret && typeof ret.then === 'function') await ret;
                        } catch (e) {
                            if (e.__skip) {
                                res.status = 'skip'; res.message = e.message || 'skipped';
                                LD(S.name, '  skip ' + tst.name + ': ' + res.message);
                            } else {
                                res.status = 'fail'; res.message = e.message || String(e);
                                LE(S.name, '  FAIL ' + tst.name + ': ' + res.message);
                            }
                        }
                        res.time = Math.round(performance.now() - t1);
                        var ei = RESULTS.findIndex(function (r) { return r.suite === S.name && r.name === tst.name; });
                        if (ei !== -1) RESULTS[ei] = res; else RESULTS.push(res);
                        updateSummary();
                        await wait(0);
                    }
                }

                var elapsed = Math.round(performance.now() - t0);
                document.getElementById('rt').textContent = (elapsed / 1000).toFixed(2) + 's';
                renderResults(); updateSummary();
                ['ba', 'bs', 'bf'].forEach(function (id) { document.getElementById(id).disabled = false; });
                running = false;
                var p = RESULTS.filter(function (r) { return r.status === 'pass'; }).length;
                var f = RESULTS.filter(function (r) { return r.status === 'fail'; }).length;
                var sk = RESULTS.filter(function (r) { return r.status === 'skip'; }).length;
                LI('RUNNER', '== Done: ' + p + ' passed, ' + f + ' failed, ' + sk + ' skipped in ' + elapsed + 'ms ==');
            }

            /* ── DOMContentLoaded: wire up buttons ───────────────────────────── */
            document.addEventListener('DOMContentLoaded', function () {
                renderSuiteBar();

                document.getElementById('ll').onchange = function (e) {
                    logFlag = e.target.value;
                    LD('TESTSTAND', 'Log level: ' + logFlag);
                };

                document.getElementById('bl').onclick = function () {
                    doMount(DS[parseInt(document.getElementById('dssr').value, 10) || 0]);
                };
                document.getElementById('dssr').onchange = function () {
                    doMount(DS[parseInt(this.value, 10) || 0]);
                };

                document.getElementById('ba').onclick = function () {
                    if (!root()) {
                        document.getElementById('rc').innerHTML =
                            '<div style="color:#dc2626;padding:16px;font-size:12px">Load a dataset first.</div>';
                        return;
                    }
                    RESULTS = [];
                    runSuites(filterIdx !== null ? [SUITES[filterIdx]] : SUITES);
                };

                document.getElementById('bs').onclick = function () {
                    if (filterIdx === null) { alert('Select a suite first.'); return; }
                    if (!root()) { alert('Load a dataset first.'); return; }
                    runSuites([SUITES[filterIdx]]);
                };

                document.getElementById('bf').onclick = function () {
                    var failed = RESULTS.filter(function (r) { return r.status === 'fail'; });
                    if (!failed.length) { LI('RUNNER', 'No failures.'); return; }
                    var fm = {};
                    failed.forEach(function (r) { if (!fm[r.suite]) fm[r.suite] = []; fm[r.suite].push(r.name); });
                    runSuites(SUITES.filter(function (s) { return fm[s.name]; }).map(function (s) {
                        return {
                            name: s.name, tests: s.tests.filter(function (t) {
                                return fm[s.name] && fm[s.name].indexOf(t.name) !== -1;
                            })
                        };
                    }));
                };

                document.getElementById('bc').onclick = function () {
                    RESULTS = []; renderResults(); updateSummary();
                    document.getElementById('rt').textContent = '';
                    document.getElementById('rc').innerHTML =
                        '<div style="color:#9ca3af;text-align:center;padding:32px;font-size:12px">Cleared.</div>';
                };

                var total = SUITES.reduce(function (a, s) { return a + s.tests.length; }, 0);
                LI('TESTSTAND', 'Test stand v1.1 ready. ' + SUITES.length + ' suites, ' + total + ' tests. Real assertions only.');

                doMount(DS[0]);
            });

        })();
    </script>
</body>

</html>
