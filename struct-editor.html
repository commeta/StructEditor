<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>StructEditor — Test</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #f0f4f8;
            --panel: #fff;
            --bd: #dde2ea;
            --acc: #2563eb;
            --acc2: #1d4ed8;
            --txt: #111827;
            --mu: #6b7280;
            --pass: #16a34a;
            --fail: #dc2626;
            --warn: #d97706;
            --pbg: #f0fdf4;
            --fbg: #fef2f2;
            --wbg: #fffbeb;
            --r: 6px;
        }

        body {
            font: 13px/1.5 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--txt);
            height: 100vh;
            overflow: hidden
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh
        }

        #top {
            background: linear-gradient(135deg, #1e3a5f 0%, #2d5a9e 100%);
            color: #fff;
            padding: 9px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .2)
        }

        #top h1 {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: -.3px;
            white-space: nowrap
        }

        .badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 9px;
            background: rgba(255, 255, 255, .18);
            font-weight: 600
        }

        #top select {
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, .3);
            background: rgba(255, 255, 255, .1);
            color: #fff;
            cursor: pointer
        }

        #top select option {
            color: #000;
            background: #fff
        }

        .sp1 {
            flex: 1
        }

        #ms {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: background .2s
        }

        #ms.ok {
            background: #dcfce7;
            color: var(--pass)
        }

        #ms.pend {
            background: #fef9c3;
            color: var(--warn)
        }

        #ms.err {
            background: #fee2e2;
            color: var(--fail)
        }

        .spin {
            width: 11px;
            height: 11px;
            border: 2px solid #93c5fd;
            border-top-color: var(--acc);
            border-radius: 50%;
            animation: sp .6s linear infinite;
            display: inline-block;
            flex-shrink: 0
        }

        @keyframes sp {
            to {
                transform: rotate(360deg)
            }
        }

        #panel-open-btn {
            font-size: 11px;
            padding: 4px 11px;
            border-radius: var(--r);
            border: 1px solid rgba(255, 255, 255, .35);
            background: rgba(255, 255, 255, .13);
            color: #fff;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
            transition: background .15s;
            flex-shrink: 0
        }

        #panel-open-btn:hover {
            background: rgba(255, 255, 255, .24)
        }

        #panel-open-btn.hidden {
            display: none
        }

        #main {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative
        }

        #ep {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            background: var(--panel);
            overflow: hidden;
            transition: flex .0s
        }

        #eph {
            background: #f8fafc;
            border-bottom: 1px solid var(--bd);
            padding: 6px 12px;
            font-size: 10px;
            font-weight: 700;
            color: var(--mu);
            text-transform: uppercase;
            letter-spacing: .6px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0
        }

        #epb {
            flex: 1;
            overflow-y: auto;
            padding: 12px
        }

        .mlbl {
            font-size: 11px;
            color: var(--mu);
            font-weight: 600;
            margin-bottom: 4px;
            display: block
        }

        .xfe {
            background: #f9fafb;
            border: 1px dashed #c9d4e0;
            border-radius: 4px;
            padding: 8px
        }

        #modx-resource-content {
            width: 100%;
            min-height: 120px;
            font: 12px/1.5 monospace;
            padding: 7px;
            border: 1px solid #c9d4e0;
            border-radius: 3px;
            resize: vertical;
            background: #fff;
            color: #333
        }

        #editor-mount-target {
            min-height: 40px
        }

        #tp-scrim {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .38);
            z-index: 99
        }

        #tp {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg);
            width: 0;
            transition: width .26s cubic-bezier(.4, 0, .2, 1);
            position: relative
        }

        #tp.open {
            border-left: 1px solid var(--bd)
        }

        #tp-resize-handle {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 5px;
            cursor: col-resize;
            z-index: 10;
            background: transparent;
            transition: background .15s
        }

        #tp-resize-handle:hover {
            background: rgba(37, 99, 235, .2)
        }

        #tc {
            background: #f8fafc;
            border-bottom: 1px solid var(--bd);
            padding: 7px 10px 7px 14px;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            align-items: center;
            flex-shrink: 0
        }

        #panel-close-btn {
            margin-left: auto;
            padding: 3px 8px;
            border-radius: var(--r);
            border: 1px solid var(--bd);
            background: transparent;
            color: var(--mu);
            font: 13px/1.3 inherit;
            cursor: pointer;
            transition: all .15s;
            flex-shrink: 0
        }

        #panel-close-btn:hover {
            background: var(--fbg);
            border-color: #fca5a5;
            color: var(--fail)
        }

        .btn {
            padding: 4px 11px;
            border: 1px solid var(--bd);
            border-radius: var(--r);
            background: var(--panel);
            color: var(--txt);
            font: 12px/1 inherit;
            cursor: pointer;
            font-weight: 500;
            transition: all .1s;
            white-space: nowrap
        }

        .btn:hover {
            background: #eef2ff;
            border-color: var(--acc);
            color: var(--acc)
        }

        .btn:disabled {
            opacity: .4;
            cursor: default
        }

        .btn.pri {
            background: var(--acc);
            color: #fff;
            border-color: var(--acc2)
        }

        .btn.pri:hover:not(:disabled) {
            background: var(--acc2)
        }

        .btn.dan:hover {
            background: var(--fbg);
            border-color: #fca5a5;
            color: var(--fail)
        }

        #dsr {
            padding: 5px 10px;
            border-bottom: 1px solid var(--bd);
            background: var(--panel);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 6px
        }

        #dsr label {
            font-size: 11px;
            font-weight: 600;
            color: var(--mu);
            white-space: nowrap
        }

        #dssr {
            font-size: 11px;
            padding: 3px 6px;
            border: 1px solid var(--bd);
            border-radius: 4px;
            font: inherit;
            background: #fff;
            flex: 1;
            min-width: 0;
            cursor: pointer
        }

        #sb {
            padding: 5px 8px;
            border-bottom: 1px solid var(--bd);
            background: var(--panel);
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
            flex-shrink: 0
        }

        .sp {
            padding: 2px 8px;
            border-radius: 9px;
            font-size: 10px;
            font-weight: 600;
            border: 1px solid var(--bd);
            background: var(--bg);
            cursor: pointer;
            transition: all .1s;
            white-space: nowrap
        }

        .sp:hover {
            border-color: var(--acc);
            color: var(--acc)
        }

        .sp.on {
            background: var(--acc);
            color: #fff;
            border-color: var(--acc2)
        }

        #sm {
            padding: 6px 10px;
            background: var(--panel);
            border-bottom: 1px solid var(--bd);
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            font-size: 12px
        }

        .sc {
            display: flex;
            align-items: center;
            gap: 3px;
            font-weight: 700
        }

        .sc.p {
            color: var(--pass)
        }

        .sc.f {
            color: var(--fail)
        }

        .sc.s {
            color: var(--warn)
        }

        .sc.t {
            color: var(--mu)
        }

        #pbw {
            flex: 1;
            height: 5px;
            background: #e5e7eb;
            border-radius: 3px;
            overflow: hidden
        }

        #pb {
            height: 100%;
            width: 0;
            background: var(--pass);
            transition: width .2s, background .2s;
            border-radius: 3px
        }

        #rt {
            font-size: 10px;
            color: var(--mu);
            margin-left: auto;
            white-space: nowrap
        }

        #rc {
            flex: 1;
            overflow-y: auto;
            padding: 5px 7px 24px
        }

        .sg {
            margin-bottom: 8px
        }

        .sh {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 8px;
            background: #f1f5f9;
            border: 1px solid var(--bd);
            border-radius: var(--r) var(--r) 0 0;
            cursor: pointer;
            user-select: none;
            font-weight: 700;
            font-size: 11px
        }

        .sh:hover {
            background: #e8f0fb
        }

        .shb {
            font-size: 10px;
            padding: 1px 5px;
            border-radius: 7px;
            font-weight: 600;
            margin-left: auto
        }

        .shb.p {
            background: #dcfce7;
            color: var(--pass)
        }

        .shb.f {
            background: #fee2e2;
            color: var(--fail)
        }

        .shb.w {
            background: #fef9c3;
            color: var(--warn)
        }

        .sbdy {
            border: 1px solid var(--bd);
            border-top: none;
            border-radius: 0 0 var(--r) var(--r)
        }

        .sbdy.col {
            display: none
        }

        .ti {
            display: flex;
            align-items: flex-start;
            gap: 6px;
            padding: 4px 8px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 11px
        }

        .ti:last-child {
            border-bottom: none
        }

        .ti.pass {
            background: var(--pbg)
        }

        .ti.fail {
            background: var(--fbg)
        }

        .ti.skip {
            background: var(--wbg)
        }

        .tic {
            font-size: 12px;
            flex-shrink: 0;
            margin-top: 1px
        }

        .tcc {
            flex: 1;
            min-width: 0
        }

        .tn {
            font-weight: 600;
            font-size: 11px
        }

        .tm {
            font-size: 10px;
            color: var(--mu);
            margin-top: 2px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            white-space: pre-wrap;
            word-break: break-all
        }

        .tm.e {
            color: var(--fail)
        }

        .tt {
            font-size: 10px;
            color: var(--mu);
            flex-shrink: 0;
            margin-top: 1px
        }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px
        }

        ::-webkit-scrollbar-track {
            background: transparent
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px
        }

        @media (max-width:767px) {
            body {
                overflow: hidden
            }

            #ep {
                border-right: none
            }

            #tp {
                position: fixed;
                top: 0;
                right: -100%;
                width: 100% !important;
                height: 100vh;
                z-index: 100;
                transition: right .26s cubic-bezier(.4, 0, .2, 1) !important;
                box-shadow: -6px 0 24px rgba(0, 0, 0, .18)
            }

            #tp.open {
                right: 0;
                border-left: none
            }

            #tp-resize-handle {
                display: none
            }

            #top h1 {
                font-size: 13px
            }
        }
    </style>
</head>

<body>

    <script>
        (function () {
            var tp = null, scrim = null, openBtn = null, dragging = false, startX = 0, startW = 0;
            function isMobile() { return window.innerWidth < 768; }
            function openPanel() {
                if (isMobile()) {
                    tp.classList.add('open');
                    scrim.style.display = 'block';
                    document.body.style.overflow = 'hidden';
                } else {
                    tp.style.width = Math.round(window.innerWidth * 0.3) + 'px';
                    tp.classList.add('open');
                }
                openBtn.classList.add('hidden');
            }
            function closePanel() {
                if (isMobile()) {
                    scrim.style.display = 'none';
                    document.body.style.overflow = '';
                    tp.classList.remove('open');
                } else {
                    tp.style.transition = 'width .26s cubic-bezier(.4,0,.2,1)';
                    tp.style.width = '0';
                    tp.classList.remove('open');
                }
                openBtn.classList.remove('hidden');
            }
            document.addEventListener('DOMContentLoaded', function () {
                tp = document.getElementById('tp');
                scrim = document.getElementById('tp-scrim');
                openBtn = document.getElementById('panel-open-btn');
                var closeBtn = document.getElementById('panel-close-btn');
                var handle = document.getElementById('tp-resize-handle');
                openBtn.addEventListener('click', openPanel);
                closeBtn.addEventListener('click', closePanel);
                scrim.addEventListener('click', closePanel);
                handle.addEventListener('mousedown', function (e) {
                    if (isMobile()) return;
                    dragging = true;
                    startX = e.clientX;
                    startW = tp.offsetWidth;
                    tp.style.transition = 'none';
                    document.body.style.userSelect = 'none';
                    document.body.style.cursor = 'col-resize';
                    e.preventDefault();
                });
                document.addEventListener('mousemove', function (e) {
                    if (!dragging) return;
                    var delta = startX - e.clientX;
                    var newW = Math.min(Math.max(startW + delta, 220), Math.round(window.innerWidth * 0.82));
                    tp.style.width = newW + 'px';
                });
                document.addEventListener('mouseup', function () {
                    if (!dragging) return;
                    dragging = false;
                    tp.style.transition = '';
                    document.body.style.userSelect = '';
                    document.body.style.cursor = '';
                });
                window.addEventListener('resize', function () {
                    if (isMobile()) {
                        if (tp.classList.contains('open')) {
                            scrim.style.display = 'block';
                        }
                        tp.style.width = '';
                    } else {
                        scrim.style.display = 'none';
                        document.body.style.overflow = '';
                    }
                });
                if (!isMobile()) openPanel();
            });
        })();
    </script>

                T('10KB document', function () { var h = '<article>'; for (var i = 0; i < 50; i++)h += '<section><h2>S' + i + '</h2><p>T '.repeat(10) + '</p></section>'; h += '</article>'; gt(Object.keys(parseAndMarkT(h).map).length, 10); }),
                T('all TEXT_TAGS', function () { var h = '<h1>H1</h1><h2>H2</h2><h3>H3</h3><h4>H4</h4><h5>H5</h5><h6>H6</h6><p>P</p><li>LI</li><dt>DT</dt><dd>DD</dd><figcaption>FC</figcaption><blockquote>BQ</blockquote><th>TH</th><td>TD</td><caption>CAP</caption><label>LBL</label><address>ADR</address><pre>PRE</pre><summary>SUM</summary>'; gt(Object.keys(parseAndMarkT(h).map).length, 8); }),
                T('all ATTR_MAP tags', function () { var h = '<a href="/x">link</a><img src="/i.jpg" alt="img"><video src="v.mp4" controls></video><audio src="a.mp3" controls></audio><iframe src="about:blank" title="f"></iframe><form action="/" method="post"></form><time datetime="2026-01-01">Jan</time>'; gt(Object.keys(parseAndMarkT(h).map).length, 3); }),
                T('IndexedDB graceful', function () { if (window.indexedDB) ass(true, 'IDB ok'); else ass(true, 'IDB absent'); }),
                T('BroadcastChannel graceful', function () { try { new BroadcastChannel('t').close(); ass(true); } catch (e) { ass(true, 'absent'); } }),
                T('serialize: long content no truncation', function () { var h = '<p>' + 'X'.repeat(5000) + '</p>'; parseAndMarkT(h); gt(serializeT().length, 4000); }),
                T('fmtHTML: deeply nested', function () { var h = '<div><div><div><p>deep</p></div></div></div>'; var r = fmtT(h); has(r, 'deep'); ass(true, 'no throw'); }),
                T('unicode roundtrip', function () { var h = '<p>🚀 日本語 العربية</p>'; parseAndMarkT(h); var s = serializeT(); has(s, '🚀'); has(s, '日本語'); }),
                T('100x serialize stable', function () { var h = '<h1>T</h1><p>P</p>'; parseAndMarkT(h); var s0 = serializeT(); for (var i = 0; i < 100; i++) { parseAndMarkT(s0); var si = serializeT(); eq(si, s0, 'iter ' + i); } }),
            ]);

            suite('CSS & UI', [
                T('#sev8-css injected', function () { ex(document.getElementById('sev8-css')); }),
                T('display:flex', function () { eq(getComputedStyle(root()).display, 'flex'); }),
                T('toolbar bg set', function () { var tb = document.getElementById('sev8-tb'); var bg = getComputedStyle(tb).backgroundImage || getComputedStyle(tb).background; ass(bg && bg.length > 0); }),
                T('exactly one active tab', function () { eq(document.querySelectorAll('.sev8-tab.active').length, 1); }),
                T('buttons have transition', function () { var b = document.querySelector('.sev8-btn'); if (!b) { ass(true); return; } ass(getComputedStyle(b).transition.length > 0); }),
                T('fmtrow has width', function () { var fr = document.getElementById('sev8-fmtrow'); if (!fr) { ass(true); return; } gt(fr.offsetWidth, 50); }),
                T('card border', function () { var c = document.querySelector('.sev8-card'); if (!c) { ass(true); return; } ass(parseFloat(getComputedStyle(c).borderTopWidth || '0') > 0); }),
                T('one active after tab switch', function () {
                    clickTab('Исходник');
                    return wait(80).then(function () { eq(document.querySelectorAll('.sev8-tab.active').length, 1); clickTab('Структур'); });
                }),
            ]);

            suite('Data Integrity', [
                T('serialize matches native ta', function () {
                    var b = syncBtn(); if (!b) { ass(true); return; } b.click();
                    return wait(200).then(function () {
                        parseAndMarkT(nta().value);
                        var s = serializeT();
                        ass(s.length > 0, 'serialize not empty');
                        ass(nta().value.length > 0, 'native ta not empty');
                    });
                }),
                T('native ta has no internal marks', function () {
                    var b = syncBtn(); if (!b) { ass(true); return; } b.click();
                    return wait(200).then(function () {
                        nohas(nta().value, 'data-sev8="');
                        nohas(nta().value, 'data-sev8ph');
                    });
                }),
                T('editing struct field updates native ta', function () {
                    return new Promise(function (res, rej) {
                        clickTab('Структур');
                        setTimeout(function () {
                            try {
                                var ts2 = tas(); if (!ts2.length) { res(); return; }
                                var marker = 'TEST_' + Date.now();
                                ts2[0].value = marker;
                                ts2[0].dispatchEvent(new Event('input', { bubbles: true }));
                                ts2[0].dispatchEvent(new Event('change', { bubbles: true }));
                                setTimeout(function () {
                                    try {
                                        var tv = nta().value;
                                        has(tv, marker, 'marker in native ta');
                                        res();
                                    } catch (e) { rej(e); }
                                }, 800);
                            } catch (e) { rej(e); }
                        }, 150);
                    });
                }),
                T('source apply preserves all tokens', function () {
                    return new Promise(function (res, rej) {
                        clickTab('Исходник');
                        setTimeout(function () {
                            try {
                                var srcTa = document.getElementById('sev8-src-ta'); if (!srcTa) { res(); return; }
                                srcTa.dispatchEvent(new Event('input', { bubbles: true }));
                                var ab = Array.prototype.filter.call(document.querySelectorAll('.sev8-btn'), function (b) { return b.textContent.indexOf('Примен') !== -1; })[0];
                                if (ab) ab.click();
                                setTimeout(function () {
                                    try {
                                        ass(nta().value.length > 0, 'native ta not empty after apply');
                                        nohas(nta().value, 'data-sev8ph', 'no ph in output');
                                        res();
                                    } catch (e) { rej(e); }
                                }, 300);
                            } catch (e) { rej(e); }
                        }, 200);
                    });
                }),
                T('round-trip: struct→source→struct', function () {
                    return new Promise(function (res, rej) {
                        clickTab('Структур');
                        setTimeout(function () {
                            var b = syncBtn(); if (b) b.click();
                            clickTab('Исходник');
                            setTimeout(function () {
                                var ab = Array.prototype.filter.call(document.querySelectorAll('.sev8-btn'), function (b) { return b.textContent.indexOf('Примен') !== -1; })[0];
                                if (ab) ab.click();
                                setTimeout(function () {
                                    try {
                                        clickTab('Структур');
                                        setTimeout(function () {
                                            try {
                                                gt(nta().value.length, 0, 'value preserved'); res();
                                            } catch (e) { rej(e); }
                                        }, 250);
                                    } catch (e) { rej(e); }
                                }, 200);
                            }, 200);
                        }, 150);
                    });
                }),
            ]);

            suite('Advanced: Token Integrity', [
                T('DS5 script survives full cycle', function () {
                    parseAndMarkT(DS[5]);
                    has(serializeT(), 'console.log', 'script in serialize');
                }),
                T('DS5 comment survives full cycle', function () {
                    parseAndMarkT(DS[5]);
                    has(serializeT(), 'Комментарий', 'comment in serialize');
                }),
                T('DS5 style survives full cycle', function () {
                    parseAndMarkT(DS[5]);
                    has(serializeT(), 'color:red', 'style in serialize');
                }),
                T('DS5 noscript tokenized', function () { parseAndMarkT(DS[5]); var s = serializeT(); nohas(s, 'data-sev8ph'); }),
                T('multiple scripts in one doc', function () {
                    var h = '<script>var a=1;<\/script><script>var b=2;<\/script><p>t</p>';
                    parseAndMarkT(h); var s = serializeT();
                    has(s, 'var a=1'); has(s, 'var b=2');
                }),
            ]);

            suite('Performance', [
                T('tokenize 1000 iterations', function () { var h = DS[7]; var t0 = performance.now(); for (var i = 0; i < 1000; i++)tokenizeT(h); ass(performance.now() - t0 < 2000, 'too slow'); }),
                T('parseAndMarkT 100 iterations', function () { var h = DS[7]; var t0 = performance.now(); for (var i = 0; i < 100; i++)parseAndMarkT(h); ass(performance.now() - t0 < 3000, 'too slow'); }),
                T('hashT 10000 iterations', function () { var t0 = performance.now(); for (var i = 0; i < 10000; i++)hashT('test string ' + i); ass(performance.now() - t0 < 500, 'too slow'); }),
                T('fmtT 200 iterations', function () { var h = DS[1]; var t0 = performance.now(); for (var i = 0; i < 200; i++)fmtT(h); ass(performance.now() - t0 < 3000, 'too slow'); }),
                T('serialize after large doc', function () { var h = '<article>'; for (var i = 0; i < 200; i++)h += '<p>Параграф номер ' + i + ' с достаточным текстом.</p>'; h += '</article>'; var t0 = performance.now(); parseAndMarkT(h); serializeT(); ass(performance.now() - t0 < 1000, 'too slow'); }),
            ]);

            var _mountTid = null;
            var _mountAttempts = 0;

            function setMS(state, txt) {
                var el = document.getElementById('ms');
                el.className = state;
                el.innerHTML = state === 'pend' ? '<span class="spin"></span>&nbsp;' + txt : txt;
            }

            function doMount(html) {
                if (_mountTid) { clearInterval(_mountTid); _mountTid = null; }
                _mountAttempts = 0;
                setMS('pend', 'монтирование…');
                LI('SETUP', 'Loading dataset (' + html.length + ' chars)');
                LD('SETUP', 'Dataset preview: ' + html.substring(0, 80));

                var oldEd = document.getElementById('sev8');
                if (oldEd) { oldEd.remove(); }
                var oldCss = document.getElementById('sev8-css');
                if (oldCss) { oldCss.remove(); }

                var ta = document.getElementById('modx-resource-content');
                ta.style.display = '';
                ta.value = html;

                LD('SETUP', 'Re-creating Ext stub and re-injecting editor script…');

                window._sevPageReady = false;
                window.Ext = {
                    _cbs: [],
                    onReady: function (fn) {
                        if (window._sevPageReady) fn();
                        else this._cbs.push(fn);
                    },
                    _fire: function () {
                        this._cbs.forEach(function (f) { try { f(); } catch (e) { } });
                        this._cbs = [];
                    }
                };

                var oldScript = document.getElementById('sev8-script');
                if (oldScript) { oldScript.remove(); }
                var s = document.createElement('script');
                s.id = 'sev8-script';
                s.src = 'struct-editor.js?_=' + Date.now();
                s.onload = function () {
                    window._sevPageReady = true;
                    if (window.Ext && window.Ext._fire) window.Ext._fire();
                    LD('SETUP', 'struct-editor.js loaded, Ext.onReady fired');
                };
                document.body.appendChild(s);

                _mountTid = setInterval(function () {
                    _mountAttempts++;
                    var ed = document.getElementById('sev8');
                    if (ed) {
                        clearInterval(_mountTid); _mountTid = null;
                        setMS('ok', '✓ mounted (' + (_mountAttempts * 50) + 'ms)');
                        LI('SETUP', 'Editor mounted in ' + (_mountAttempts * 50) + 'ms');
                        RESULTS = []; updateSummary();
                        document.getElementById('rc').innerHTML = '<div style="color:#9ca3af;text-align:center;padding:32px;font-size:12px">Датасет загружен. Нажмите <b>Run All</b>.</div>';
                        return;
                    }
                    if (_mountAttempts >= 100) {
                        clearInterval(_mountTid); _mountTid = null;
                        setMS('err', '⚠ mount timeout');
                        LW('SETUP', 'Editor mount timeout after ' + (_mountAttempts * 50) + 'ms');
                    }
                }, 50);
            }

            function renderSuiteBar() {
                var bar = document.getElementById('sb'); bar.innerHTML = '';
                var all = document.createElement('button'); all.className = 'sp' + (filterIdx === null ? ' on' : ''); all.textContent = 'All';
                all.onclick = function () { filterIdx = null; renderSuiteBar(); }; bar.appendChild(all);
                SUITES.forEach(function (s, i) {
                    var p = document.createElement('button');
                    p.className = 'sp' + (filterIdx === i ? ' on' : '');
                    p.textContent = s.name.replace(/^[^:]+:\s*/, '').substring(0, 16);
                    p.onclick = function () { filterIdx = i; renderSuiteBar(); };
                    bar.appendChild(p);
                });
            }

            function updateSummary() {
                var pass = 0, fail = 0, skip = 0;
                RESULTS.forEach(function (r) { if (r.status === 'pass') pass++; else if (r.status === 'fail') fail++; else skip++; });
                document.getElementById('cp').textContent = pass;
                document.getElementById('cf').textContent = fail;
                document.getElementById('cs').textContent = skip;
                document.getElementById('ct').textContent = RESULTS.length;
                var total = RESULTS.length;
                var bar = document.getElementById('pb');
                bar.style.width = total ? ((pass + skip) / total * 100) + '%' : '0%';
                bar.style.background = fail ? '#dc2626' : pass ? '#16a34a' : '#d97706';
            }

            function renderResults() {
                var rc = document.getElementById('rc'); rc.innerHTML = '';
                var suites = {};
                RESULTS.forEach(function (r) { if (!suites[r.suite]) suites[r.suite] = []; suites[r.suite].push(r); });
                Object.keys(suites).forEach(function (sn) {
                    var items = suites[sn], grp = document.createElement('div'); grp.className = 'sg';
                    var hdr = document.createElement('div'); hdr.className = 'sh';
                    var pc = items.filter(function (i) { return i.status === 'pass'; }).length;
                    var fc = items.filter(function (i) { return i.status === 'fail'; }).length;
                    hdr.innerHTML = '<span>' + eh(sn) + '</span>';
                    var badge = document.createElement('span');
                    badge.className = 'shb ' + (fc ? 'f' : 'p');
                    badge.textContent = pc + '/' + items.length;
                    hdr.appendChild(badge);
                    var body = document.createElement('div');
                    body.className = 'sbdy' + (fc === 0 ? ' col' : '');
                    hdr.addEventListener('click', function () { body.classList.toggle('col'); });
                    items.forEach(function (r) {
                        var row = document.createElement('div'); row.className = 'ti ' + r.status;
                        row.innerHTML = '<span class="tic">' + (r.status === 'pass' ? '✓' : r.status === 'fail' ? '✗' : '⚠') + '</span>' +
                            '<div class="tcc"><div class="tn">' + eh(r.name) + '</div>' + (r.message ? '<div class="tm' + (r.status === 'fail' ? ' e' : '') + '">' + (eh(r.message)) + '</div>' : '') +
                            '</div><span class="tt">' + r.time + 'ms</span>';
                        body.appendChild(row);
                    });
                    grp.appendChild(hdr); grp.appendChild(body); rc.appendChild(grp);
                });
            }

            async function runSuites(list) {
                if (running) return; running = true;
                var t0 = performance.now(), total = list.reduce(function (a, s) { return a + s.tests.length; }, 0);
                document.getElementById('rc').innerHTML = '<div style="padding:10px;color:#6b7280;font-size:12px;display:flex;align-items:center;gap:6px"><div class="spin"></div> Выполняется ' + total + ' тестов…</div>';
                ['ba', 'bs', 'bf'].forEach(function (id) { document.getElementById(id).disabled = true; });
                for (var si = 0; si < list.length; si++) {
                    var S = list[si]; LI('RUNNER', '══ ' + S.name + ' ══');
                    for (var ti = 0; ti < S.tests.length; ti++) {
                        var tst = S.tests[ti], t1 = performance.now();
                        LD(S.name, '  → ' + tst.name);
                        var res = { suite: S.name, name: tst.name, status: 'pass', message: '', time: 0 };
                        try { var ret = tst.fn(); if (ret && typeof ret.then === 'function') await ret; }
                        catch (e) { res.status = 'fail'; res.message = e.message || String(e); LE(S.name, '  ✗ ' + tst.name + ': ' + res.message); }
                        res.time = Math.round(performance.now() - t1);
                        var ei = RESULTS.findIndex(function (r) { return r.suite === S.name && r.name === tst.name; });
                        if (ei !== -1) RESULTS[ei] = res; else RESULTS.push(res);
                        updateSummary(); await wait(0);
                    }
                }
                var elapsed = Math.round(performance.now() - t0);
                document.getElementById('rt').textContent = (elapsed / 1000).toFixed(2) + 's';
                renderResults(); updateSummary();
                ['ba', 'bs', 'bf'].forEach(function (id) { document.getElementById(id).disabled = false; });
                running = false;
                LI('RUNNER', '══ Done: ' + RESULTS.filter(function (r) { return r.status === 'pass'; }).length + ' passed, ' + RESULTS.filter(function (r) { return r.status === 'fail'; }).length + ' failed in ' + elapsed + 'ms ══');
            }

            document.addEventListener('DOMContentLoaded', function () {
                renderSuiteBar();

                document.getElementById('ll').onchange = function (e) {
                    logFlag = e.target.value;
                    LD('TESTSTAND', 'Log level: ' + logFlag);
                };

                document.getElementById('bl').onclick = function () {
                    doMount(DS[parseInt(document.getElementById('dssr').value, 10) || 0]);
                };

                document.getElementById('dssr').onchange = function () {
                    doMount(DS[parseInt(this.value, 10) || 0]);
                };

                document.getElementById('ba').onclick = function () {
                    if (!root()) {
                        document.getElementById('rc').innerHTML = '<div style="color:#dc2626;padding:16px;font-size:12px">⚠ Сначала загрузите датасет.</div>';
                        return;
                    }
                    RESULTS = [];
                    runSuites(filterIdx !== null ? [SUITES[filterIdx]] : SUITES);
                };

                document.getElementById('bs').onclick = function () {
                    if (filterIdx === null) { alert('Сначала выберите suite-кнопку.'); return; }
                    if (!root()) { alert('Сначала загрузите датасет.'); return; }
                    runSuites([SUITES[filterIdx]]);
                };

                document.getElementById('bf').onclick = function () {
                    var failed = RESULTS.filter(function (r) { return r.status === 'fail'; });
                    if (!failed.length) { LI('RUNNER', 'Нет ошибок.'); return; }
                    var fm = {};
                    failed.forEach(function (r) { if (!fm[r.suite]) fm[r.suite] = []; fm[r.suite].push(r.name); });
                    runSuites(SUITES.filter(function (s) { return fm[s.name]; }).map(function (s) {
                        return { name: s.name, tests: s.tests.filter(function (t) { return fm[s.name] && fm[s.name].indexOf(t.name) !== -1; }) };
                    }));
                };

                document.getElementById('bc').onclick = function () {
                    RESULTS = []; renderResults(); updateSummary();
                    document.getElementById('rt').textContent = '';
                    document.getElementById('rc').innerHTML = '<div style="color:#9ca3af;text-align:center;padding:32px;font-size:12px">Очищено.</div>';
                };

                var total = SUITES.reduce(function (a, s) { return a + s.tests.length; }, 0);
                LI('TESTSTAND', 'Test stand initialized. ' + SUITES.length + ' suites registered, ' + total + ' tests total.');
                LD('TESTSTAND', 'Log level: ' + logFlag);

                doMount(DS[0]);
            });
        })();
    </script>
